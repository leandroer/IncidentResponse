name: Site quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 13 * * 1"

permissions:
  contents: read

jobs:
  structural-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Audit HTML structure and local links
        run: python3 scripts/site_audit.py

  external-links:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Check external resource links
        run: python3 scripts/site_audit.py --external
